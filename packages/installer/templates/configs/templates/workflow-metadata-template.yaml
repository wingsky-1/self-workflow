# ⚠️ 已废弃 — 自 V1.5.2 起，新任务不再使用此模板。
# task.yaml 已直接包含 phases 段取代 workflow.yaml。
# 此文件保留仅作历史参考，安装器仍会部署但 /feat 命令不再引用。
# 详见 ADR-001：合并 task.yaml 和 workflow.yaml 为单一元数据文件

# 工作流实例元数据
# 在工作流启动时创建，各阶段更新状态

workflow-id: <workflow-id>
type: feat
status: in_progress  # in_progress | completed | cancelled | stuck
created: <YYYY-MM-DDTHH:mm:ss>
updated: <YYYY-MM-DDTHH:mm:ss>
description: <特性描述>

phases:
  - id: 1
    name: 需求分析
    status: pending    # pending | in_progress | completed | failed
    gate: pending      # pending | passed | failed | skipped
    started: null
    completed: null
    artifact: "01-analysis.md"
    errors: []         # error IDs 列表

  - id: 2
    name: 方案设计
    status: pending
    gate: pending
    started: null
    completed: null
    artifact: "02-design.md"
    errors: []

  - id: 3
    name: 代码实现
    status: pending
    gate: pending
    started: null
    completed: null
    artifact: "03-implementation.md"
    errors: []

  - id: 4
    name: 功能验证
    status: pending
    gate: pending
    started: null
    completed: null
    artifact: "04-verification.md"
    errors: []

  - id: 5
    name: 总结沉淀
    status: pending
    gate: pending
    started: null
    completed: null
    artifact: "05-summary.md"
    errors: []

# 错误索引（errors/<workflow-id>/errors.yaml 独立维护）
# 格式：
# errors:
#   - id: err-001
#     phase: 1
#     description: "<简要描述>"
#     severity: blocking | minor
#     timestamp: <YYYY-MM-DDTHH:mm:ss>
#     resolved: true | false
