# 架构规范
# 定义项目层次结构和依赖方向

name: architecture
version: 1.0.0
applicable-workflows: [feat, review]

rules:
  - id: layer-001
    description: 安装器代码(src/installer)不应引用运行时配置格式
    level: MUST
    scope: architecture
    enforcement: review

  - id: layer-002
    description: 运行时配置(.self-workflow/configs/)不应引用安装器实现
    level: MUST
    scope: architecture
    enforcement: review

  - id: layer-003
    description: 模板(templates/)是安装内容的唯一源，非安装器代码
    level: MUST
    scope: architecture
    enforcement: review

  - id: boundary-001
    description: .opencode/ 下的文件只能通过安装器修改
    level: MUST
    scope: project
    enforcement: review

  - id: boundary-002
    description: .self-workflow/configs/ 下的文件只能通过安装器修改
    level: MUST
    scope: project
    enforcement: review

  - id: boundary-003
    description: .self-workflow/tasks/ 下的文件可以直接编辑
    level: SHOULD
    scope: project
    enforcement: review
