description: >
  V1.11 版本——减少不必要的 question 打断，让 Agent 更自主决策；增强 /feat 命令（无参数自动认领、结束后自动更新 todo）；内置工具化让确定性操作由代码完成。
  关联 todo 项：
  1. 评审问题给出 2~4 个可行方案，置信度 >95 则自动决策
  2. /feat 增强——无输入时自动分析/认领任务
  3. /feat 增强——从 todo 领取任务结束后自动更新 todo 状态
  4. todo 整理排期 command——Agent 可自主整理 todo、排期
  5. todo 系统注入机制——确定 todo 介绍注入到哪些场景
  6. 歧义澄清 spec——Agent 遇到歧义输入时必须质疑询问
  7. /feat 无人值守模式——Agent 自主完成 feat，用户事后评审
  8. 内置 tool 化——确定性操作由内置 tool 实现

